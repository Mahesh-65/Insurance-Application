version: '3.9'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '5000:5000'
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/insurance-management
      JWT_SECRET: change-me
      NODE_ENV: production
      CLIENT_URL: http://localhost:5000
      AZURE_STORAGE_CONNECTION_STRING: ${AZURE_STORAGE_CONNECTION_STRING:-}
      AZURE_CONTAINER_NAME: ${AZURE_CONTAINER_NAME:-insurance-documents}
    depends_on:
      - mongo
  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
